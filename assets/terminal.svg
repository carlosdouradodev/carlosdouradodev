<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Dourado retro cyberpunk terminal</title>
  <desc id="desc">Neon terminal interface with retro cyberpunk panels, scanlines, focus cards, and status text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07000e"/>
      <stop offset="0.45" stop-color="#061420"/>
      <stop offset="1" stop-color="#160019"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="20%" cy="12%" r="66%">
      <stop offset="0" stop-color="#ff2bd6" stop-opacity="0.32"/>
      <stop offset="0.46" stop-color="#ff2bd6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="86%" cy="18%" r="58%">
      <stop offset="0" stop-color="#23f6ff" stop-opacity="0.30"/>
      <stop offset="0.52" stop-color="#23f6ff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#23f6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2bd6"/>
      <stop offset="0.52" stop-color="#37f8ff"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <pattern id="scan" width="4" height="5" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <pattern id="microgrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#1fc7d4" stroke-width="0.7" opacity="0.10"/>
    </pattern>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pinkNeon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, 'Courier New', monospace; }
      .pink { fill: #ff4fdd; }
      .cyan { fill: #40f7ff; }
      .green { fill: #43ff78; }
      .white { fill: #f8fbff; }
      .muted { fill: #8fa3b4; }
      .panel { fill: #050713; stroke: #2cf4ff; stroke-opacity: 0.42; }
      .pinkStroke { stroke: #ff2bd6; stroke-opacity: 0.66; }
      .cyanStroke { stroke: #27f7ff; stroke-opacity: 0.58; }
      .thin { stroke-width: 1.5; fill: none; }
      .thick { stroke-width: 4; fill: none; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="760" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="760" rx="22" fill="url(#pinkGlow)"/>
  <rect width="1200" height="760" rx="22" fill="url(#cyanGlow)"/>
  <rect x="0" y="0" width="1200" height="760" rx="22" fill="url(#microgrid)" opacity="0.76"/>

  <g opacity="0.44">
    <path d="M0 106H1200" class="thin cyanStroke"/>
    <path d="M0 226H1200" class="thin pinkStroke"/>
    <path d="M0 346H1200" class="thin cyanStroke"/>
    <path d="M0 466H1200" class="thin pinkStroke"/>
    <path d="M0 586H1200" class="thin cyanStroke"/>
  </g>

  <g transform="translate(46 42)">
    <path d="M20 0H1088Q1110 0 1110 22V676Q1110 698 1088 698H20Q0 698 0 676V22Q0 0 20 0Z" fill="#050610" opacity="0.94" stroke="#627083" stroke-opacity="0.52"/>
    <text x="28" y="36" class="mono white" font-size="18">carlosdouradodev</text>
    <text x="222" y="36" class="mono cyan" font-size="18">/ README.md</text>
    <path d="M1110 76V220" class="thick pinkStroke" filter="url(#pinkNeon)"/>

    <g transform="translate(28 70)">
      <path d="M22 0H1060Q1082 0 1082 22V450Q1082 472 1060 472H22Q0 472 0 450V22Q0 0 22 0Z" fill="#060713" stroke="#512050" stroke-opacity="0.90"/>
      <path d="M0 86L34 52H342L354 40H720L750 8H1036L1068 38V424L1034 458H36L0 424Z" fill="none" stroke="#1cefff" stroke-opacity="0.46" stroke-width="1.6"/>
      <path d="M0 86L34 52H342L354 40H720L750 8" fill="none" stroke="#ff2bd6" stroke-opacity="0.78" stroke-width="3.4" filter="url(#pinkNeon)"/>
      <path d="M720 8H1036L1068 38V110" fill="none" stroke="#25f6ff" stroke-opacity="0.74" stroke-width="2.2"/>
      <path d="M28 456H690" fill="none" stroke="url(#lineGlow)" stroke-width="2.2" opacity="0.70"/>
      <path d="M48 74H1016V382H48Z" fill="#050814" stroke="#152b38" stroke-width="1.2" opacity="0.90"/>

      <text x="26" y="34" class="mono pink" font-size="22" font-weight="700">&gt;&gt; TERMINAL</text>
      <text x="838" y="52" class="mono cyan" font-size="20">SESSION: ACTIVE</text>
      <rect x="1024" y="35" width="12" height="12" fill="#43ff78" filter="url(#neon)"/>

      <g transform="translate(88 112)" class="mono" filter="url(#neon)">
        <text x="0" y="0" class="cyan" font-size="22">~/carlosdouradodev</text>
        <text x="0" y="44" class="green" font-size="20">$ whoami</text>
        <text x="0" y="114" class="white" font-size="54" font-weight="700">Carlos Dourado</text>
        <text x="0" y="162" class="cyan" font-size="22">security tooling   |   automation   |   OSINT   |   low-trust interfaces</text>
        <path d="M0 190H858" stroke="#214457" stroke-width="2"/>
        <text x="0" y="236" class="green" font-size="20">$ status</text>
        <text x="0" y="276" class="cyan" font-size="22">building tools that expose behavior</text>
        <text x="0" y="310" class="cyan" font-size="22">and reduce blind spots</text>
        <rect x="842" y="248" width="16" height="54" class="cyan cursor"/>
      </g>

      <g opacity="0.52">
        <path d="M0 184H1082" stroke="#23f6ff" stroke-width="1"/>
        <path d="M0 264H1082" stroke="#ff2bd6" stroke-width="1"/>
        <path d="M0 344H1082" stroke="#23f6ff" stroke-width="1"/>
      </g>
    </g>

    <g transform="translate(28 570)">
      <path d="M0 0H1082V106H0Z" fill="#080817" stroke="#ff2bd6" stroke-opacity="0.46"/>
      <text x="28" y="36" class="mono pink" font-size="22" font-weight="700">// FOCUS.EXE</text>

      <g transform="translate(28 56)">
        <rect width="192" height="34" fill="#050814" stroke="#27f7ff" stroke-opacity="0.42"/>
        <text x="20" y="23" class="mono cyan" font-size="17">security tooling</text>
      </g>
      <g transform="translate(244 56)">
        <rect width="186" height="34" fill="#050814" stroke="#ff2bd6" stroke-opacity="0.42"/>
        <text x="20" y="23" class="mono cyan" font-size="17">OSINT workflows</text>
      </g>
      <g transform="translate(454 56)">
        <rect width="196" height="34" fill="#050814" stroke="#27f7ff" stroke-opacity="0.42"/>
        <text x="20" y="23" class="mono cyan" font-size="17">automation scripts</text>
      </g>
      <g transform="translate(674 56)">
        <rect width="222" height="34" fill="#050814" stroke="#ff2bd6" stroke-opacity="0.42"/>
        <text x="20" y="23" class="mono cyan" font-size="17">adversarial interface</text>
      </g>
      <g transform="translate(920 56)">
        <rect width="134" height="34" fill="#050814" stroke="#27f7ff" stroke-opacity="0.42"/>
        <text x="20" y="23" class="mono cyan" font-size="17">data work</text>
      </g>
    </g>
  </g>

  <rect width="1200" height="760" rx="22" fill="url(#scan)"/>
</svg>
