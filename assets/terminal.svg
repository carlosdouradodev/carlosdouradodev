<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Dourado terminal profile banner</title>
  <desc id="desc">Dark terminal styled banner with green command text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110d"/>
      <stop offset="0.52" stop-color="#0d1517"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="scan" cx="50%" cy="15%" r="70%">
      <stop offset="0" stop-color="#20f986" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#20f986" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#20f986" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#1f6f47" stroke-width="1" opacity="0.18"/>
    </pattern>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, 'Courier New', monospace; }
      .dim { fill: #7f9f92; }
      .green { fill: #24f27b; }
      .soft { fill: #c8facc; }
      .muted { fill: #8b949e; }
      .line { stroke: #24f27b; stroke-opacity: 0.24; }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="22" fill="url(#scan)"/>
  <rect width="1200" height="420" rx="22" fill="url(#grid)"/>

  <g opacity="0.36">
    <path class="line" d="M0 76 H1200"/>
    <path class="line" d="M0 144 H1200"/>
    <path class="line" d="M0 212 H1200"/>
    <path class="line" d="M0 280 H1200"/>
    <path class="line" d="M0 348 H1200"/>
  </g>

  <g transform="translate(78 58)">
    <rect width="1044" height="304" rx="18" fill="#050a08" opacity="0.88" stroke="#2ea65f" stroke-opacity="0.38"/>
    <rect width="1044" height="48" rx="18" fill="#101820"/>
    <path d="M0 31 Q0 0 31 0 H1013 Q1044 0 1044 31 V48 H0 Z" fill="#101820"/>
    <circle cx="28" cy="24" r="7" fill="#ff5f56"/>
    <circle cx="52" cy="24" r="7" fill="#ffbd2e"/>
    <circle cx="76" cy="24" r="7" fill="#27c93f"/>
    <text x="112" y="31" class="mono muted" font-size="16">~/carlosdouradodev</text>

    <g class="mono" filter="url(#glow)">
      <text x="44" y="92" class="green" font-size="24">$ whoami</text>
      <text x="44" y="132" class="soft" font-size="42" font-weight="700">Carlos Dourado</text>
      <text x="44" y="177" class="dim" font-size="24">security tooling | automation | OSINT | low-trust interfaces</text>
      <text x="44" y="228" class="green" font-size="24">$ status</text>
      <text x="44" y="266" class="soft" font-size="24">building tools that expose behavior and reduce blind spots</text>
      <rect x="910" y="248" width="14" height="30" class="green cursor"/>
    </g>
  </g>
</svg>
