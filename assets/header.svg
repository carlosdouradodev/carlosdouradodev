<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Dourado simple animated header</title>
  <desc id="desc">Minimal dark header with a blinking cursor and soft scanning line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090d12"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#60a5fa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, 'Courier New', monospace; }
      .name { fill: #e5e7eb; }
      .sub { fill: #93c5fd; }
      .dim { fill: #6b7280; }
    </style>
  </defs>

  <rect width="900" height="160" rx="14" fill="url(#bg)"/>
  <rect x="22" y="22" width="856" height="116" rx="10" fill="#070a0f" stroke="#243244"/>
  <rect x="-180" y="24" width="160" height="112" fill="url(#scan)" opacity="0.6">
    <animate attributeName="x" values="-180;920" dur="5s" repeatCount="indefinite"/>
  </rect>

  <text x="48" y="64" class="mono dim" font-size="16">$ whoami</text>
  <text x="48" y="100" class="mono name" font-size="34" font-weight="700">Carlos Dourado</text>
  <text x="48" y="126" class="mono sub" font-size="18">Java · JS/TS · PHP</text>
  <rect x="304" y="75" width="13" height="32" fill="#93c5fd">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
