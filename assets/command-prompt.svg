<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Retro command prompt profile</title>
  <desc id="desc">A CRT styled Windows command prompt with green terminal text, ASCII art, scanlines, and subtle animation.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171b18"/>
      <stop offset="0.5" stop-color="#101310"/>
      <stop offset="1" stop-color="#090b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="45%" r="70%">
      <stop offset="0" stop-color="#6aff7d" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#2bff4d" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#2bff4d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <filter id="crt" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, 'Courier New', monospace; }
      .green { fill: #6dff7a; }
      .dim { fill: #a3c0a2; }
      .amber { fill: #ffbf45; }
      .line { stroke: #35f04b; stroke-opacity: 0.48; }
      .mesh { stroke: #2fff48; stroke-opacity: 0.22; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="#010401"/>

  <g opacity="0.52">
    <path class="mesh" d="M930 46L1098 132L996 260L1164 350L1020 504L1182 606"/>
    <path class="mesh" d="M930 46L996 260L870 352L1020 504L872 612"/>
    <path class="mesh" d="M1098 132L1164 350L1182 606"/>
    <path class="mesh" d="M996 260L1164 350"/>
    <path class="mesh" d="M870 352L1020 504"/>
    <circle cx="930" cy="46" r="3" fill="#35f04b"/>
    <circle cx="996" cy="260" r="3" fill="#35f04b"/>
    <circle cx="1020" cy="504" r="3" fill="#35f04b"/>
    <circle cx="1164" cy="350" r="3" fill="#35f04b"/>
  </g>

  <g transform="translate(36 28)">
    <rect width="1084" height="574" rx="10" fill="url(#screen)" stroke="#35f04b" stroke-opacity="0.78" filter="url(#softGlow)"/>
    <rect width="1084" height="574" rx="10" fill="url(#glow)"/>
    <rect width="1084" height="36" fill="#111411" stroke="#35f04b" stroke-opacity="0.44"/>
    <text x="14" y="24" class="mono dim" font-size="17">// Command Prompt [VERSION 10.0.26100.6584]</text>
    <circle cx="1012" cy="18" r="7" fill="#ff5757"/>
    <circle cx="1036" cy="18" r="7" fill="#f4c542"/>
    <circle cx="1060" cy="18" r="7" fill="#39d353"/>

    <g filter="url(#crt)">
      <text x="28" y="78" class="mono green" font-size="24">C:\Users\Carlos&gt;</text>

      <g class="mono green" font-size="10" opacity="0.78">
        <text x="246" y="126">000111001010001110001010010111000101010001110001</text>
        <text x="214" y="138">001111111001111001111101111011101111001111101111100</text>
        <text x="188" y="150">01111000001111000000111100000011110000001111000001110</text>
        <text x="170" y="162">11100000111100011100011110001110001111000111000111100</text>
        <text x="158" y="174">11000011110001111000111100011110001111000111100011110</text>
        <text x="152" y="186">1000011110001111000111100011110001111000111100011110</text>
        <text x="148" y="198">000011110001111000111100011110001111000111100011110</text>
        <text x="154" y="210">00111100011110001111000111100011110001111000111100</text>
        <text x="168" y="222">011100011110001111000111100011110001111000111100</text>
        <text x="188" y="234">11000111100011110001111000111100011110001110</text>
        <text x="210" y="246">000111100011110001111000111100011110001</text>
      </g>

      <g class="mono green" font-size="15" opacity="0.88">
        <text x="250" y="280">   ____              _             ____                              _       </text>
        <text x="250" y="302">  / ___|__ _ _ __ __| | ___  ___  |  _ \  ___  _   _ _ __ __ _  __| | ___  </text>
        <text x="250" y="324"> | |   / _` | '__/ _` |/ _ \/ __| | | | |/ _ \| | | | '__/ _` |/ _` |/ _ \ </text>
        <text x="250" y="346"> | |__| (_| | | | (_| | (_) \__ \ | |_| | (_) | |_| | | | (_| | (_| | (_) |</text>
        <text x="250" y="368">  \____\__,_|_|  \__,_|\___/|___/ |____/ \___/ \__,_|_|  \__,_|\__,_|\___/ </text>
      </g>

      <text x="28" y="426" class="mono green" font-size="24">&gt;&gt; Loading profile</text>
      <text x="230" y="426" class="mono green" font-size="24">
        <tspan>.</tspan>
        <tspan>.</tspan>
        <tspan>.</tspan>
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/>
      </text>

      <text x="28" y="478" class="mono green" font-size="24">&gt; Building tools for low-trust workflows.</text>
      <text x="28" y="522" class="mono green" font-size="24">&gt; Automation, OSINT, interface design, local inspection.</text>
      <text x="28" y="566" class="mono green" font-size="24">&gt; Current mode: </text>
      <text x="238" y="566" class="mono amber" font-size="24">reduce blind spots</text>
      <rect x="496" y="546" width="15" height="26" fill="#6dff7a">
        <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <rect width="1084" height="574" rx="10" fill="url(#scanlines)"/>
  </g>
</svg>
